name: Python CI Application

on:
  push:
    branches: [ "main", "feature-cicd-pipeline" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Lint code with flake8
      run: |
        pip install flake8
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Build and Start Microservices (Docker)
      run: |
        docker compose up -d --build
        sleep 10

    - name: Demonstrate GitHub Secrets
      env:
        SUPER_SECRET: ${{ secrets.MY_SUPER_SECRET_KEY }}
      run: |
        echo "Спроба вивести секрет у консоль:"
        echo "Мій секрет: $SUPER_SECRET"

    - name: Run API Tests with Newman
      run: |
        npx newman run collection.json