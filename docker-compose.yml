version: '3.8'

services:
  inventory-service:
    build: ./inventory_service
    container_name: inventory-service
    environment:
      - STUDENT_N=2
    ports:
      - "8002:8000" 
    networks:
      - cafe-net

  order-service:
    build: ./order_service
    container_name: order-service
    environment:
      - STUDENT_N=2
    ports:
      - "9002:8000"
    depends_on:
      - inventory-service
    networks:
      - cafe-net

networks:
  cafe-net:
    driver: bridge